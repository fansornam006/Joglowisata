<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0,5">
    <title>Login - Web UKK</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/style.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg sticky-top bg-warning">
        <div class="container">
            <a class="navbar-brand text-white" href="#beranda">
                Joglo Wisata
            </a>

            <button class="nav-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link text-white" href="dashboard.html">Beranda</a>
                    <a class="nav-link text-white" href="dashboard.html">Tentang</a>
                    <a class="nav-link text-white" href="dashboard.html">Daftar Paket Wisata</a>
                    <a class="nav-link text-white" href="dashboard.html">Kontak</a>
                </div>
            </div>
        </div>
    </nav>

    <section class="bg-dua ">
        <img class="header" src="asset/logo.jpg" alt="header">
    </section>


    <!-- Formulir Login -->
    <section class="login-section d-flex align-items-center">
        <div class="container">
            <div class="row justify-content-center align-items-center">


                <!-- FORM -->
                <div class="col-md-5">
                    <div class="login-card p-5 shadow">
                        <h3 class="text-center mb-4">login</h3>

                        <form onsubmit="login(event)">
                            <div class="mb-3">
                                <label>Email</label>
                                <input type="text" id="email" class="form-control">
                            </div>

                            <div class="mb-3">
                                <label>Password</label>
                                <input type="password" id="password" class="form-control">
                            </div>


                            <div class="d-flex justify-content-between">
         <button type="submit" class="btn btn-primary ">Login </button>

                                <button type="reset" class="btn btn-secondary">Batal</button>
                            </div>

                            <p class="text-center mt-3">
                                Belum punya akun? <a href="register.html">Klik disini</a>
                            </p>

                            <div class="text-center mt-4">
                                <a href="#" class="text-dark fs-3 me-3">
                                    <i class="bi bi-facebook"></i>
                                </a>
                                <a href="#" class="text-info fs-3 me-3">
                                    <i class="bi bi-twitter"></i>
                                </a>
                                <a href="#" class="text-success fs-3">
                                    <i class="bi bi-whatsapp"></i>
                                </a>
                            </div>

                        </form>

                    </div>
                </div>

            </div>
        </div>
    </section>

    <footer class="bg-dark text-white py-3 text-center">
        <p class="mb-0">&copy; Joglo Wisata 2026</p>
    </footer>
    <script src="js/login.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>



</body>

</html>
